[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "nlab-modbus"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
    "pymodbus",
    "pyserial",
    "zeroconf",
    "pyqtgraph",
    "PySide6"
]

[project.optional-dependencies]
dev = [
    "matplotlib",
    "numpy",
    "pip-licenses"
]

[tool.setuptools.packages.find]
where = ["src"]