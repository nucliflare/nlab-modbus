name: build
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            runs-on: windows-local
            python-exe: python
            venv-python: .venv/Scripts/python.exe
            artifact: build/nlab-modbus-gui.exe
          - name: ubuntu
            runs-on: ubuntu-local
            python-exe: python3
            venv-python: .venv/bin/python
            artifact: build/nlab-modbus-gui
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches package version
        if: github.event_name == 'push'
        run: ${{ matrix.python-exe }} scripts/check_release_tag.py

      - name: Install Qt runtime deps (Linux only)
        if: matrix.name == 'ubuntu'
        run: |
          apt-get update
          apt-get install -y curl \
            libgl1 libegl1 libxkbcommon0 libxcb-cursor0 libxcb-icccm4 \
            libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-shape0 \
            libxcb-xinerama0 patchelf

      - name: Install uv and Python 3.12 (Linux only)
        if: matrix.name == 'ubuntu'
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Create venv (Linux)
        if: matrix.name == 'ubuntu'
        run: uv venv --seed --python 3.12 .venv

      - name: Create venv (Windows)
        if: matrix.name == 'windows'
        run: ${{ matrix.python-exe }} -m venv .venv

      - name: Install
        run: |
          ${{ matrix.venv-python }} -m pip install --upgrade pip uv
          ${{ matrix.venv-python }} -m uv pip install -e ".[gui,build]"

      - name: Generate UI modules
        run: ${{ matrix.venv-python }} scripts/gui_compiler.py

      - name: Build
        run: ${{ matrix.venv-python }} scripts/build_nuitka.py

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: nlab-modbus-gui-${{ matrix.name }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-local
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v3
        with:
          path: dist

      - name: Create Gitea Release
        uses: akkuman/gitea-release-action@v1
        with:
          files: dist/**/*
