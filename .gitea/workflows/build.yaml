name: build
on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            runs-on: windows-local
            python-exe: python
            venv-python: .venv/Scripts/python.exe
            artifact: build/nlab-modbus-gui.exe
          - name: ubuntu
            runs-on: ubuntu-local
            python-exe: python3
            venv-python: .venv/bin/python
            artifact: build/nlab-modbus-gui
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt runtime deps (Linux only)
        if: matrix.name == 'ubuntu'
        run: |
          apt-get update
          apt-get install -y python3.11-venv python3.11-dev \
            libgl1 libegl1 libxkbcommon0 libxcb-cursor0 libxcb-icccm4 \
            libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-shape0 \
            libxcb-xinerama0 patchelf

      - name: Create venv
        run: ${{ matrix.python-exe }} -m venv .venv

      - name: Install
        run: |
          ${{ matrix.venv-python }} -m pip install --upgrade pip uv
          ${{ matrix.venv-python }} -m uv pip install -e ".[gui,build]"

      - name: Generate UI modules
        run: ${{ matrix.venv-python }} scripts/gui_compiler.py

      - name: Build
        run: ${{ matrix.venv-python }} scripts/build_nuitka.py

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: nlab-modbus-gui-${{ matrix.name }}
          path: ${{ matrix.artifact }}
